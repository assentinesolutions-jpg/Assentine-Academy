<!DOCTYPE html>
<html>
<head>
    <style>
        /* All the styling is here so you only need one file */
        body { font-family: sans-serif; margin: 0; line-height: 1.6; color: #333; }
        .header { background: #111; color: #fff; padding: 2rem; text-align: center; }
        .section { padding: 3rem 10%; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-top: 2rem; }
        .card { border: 1px solid #ddd; padding: 20px; border-radius: 8px; }
        .gold { color: #c5a059; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h1>ASSENTINE ACADEMY</h1>
        <p>Your Path to Professional Excellence</p>
    </div>

    <div class="section">
        <h2>Our Programs</h2>
        <div class="grid">
            <div class="card">
                <h3>Strategy</h3>
                <p>Master corporate frameworks.</p>
            </div>
            <div class="card">
                <h3>Leadership</h3>
                <p>Lead teams with confidence.</p>
            </div>
            <div class="card">
                <h3>Compliance</h3>
                <p>Navigate complex regulations.</p>
            </div>
        </div>
    </div>

</body>
</html>
